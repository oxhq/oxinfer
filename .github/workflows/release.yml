name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_os: linux
            asset_arch: amd64
            ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            asset_os: darwin
            asset_arch: amd64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_os: darwin
            asset_arch: arm64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_os: windows
            asset_arch: amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --target "${{ matrix.target }}"
          mkdir -p dist
          tag="${GITHUB_REF_NAME}"
          asset="oxinfer_${tag}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}${{ matrix.ext }}"
          cp "target/${{ matrix.target }}/release/oxinfer${{ matrix.ext }}" "dist/${asset}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxinfer-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && sha256sum * > checksums.txt)

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
