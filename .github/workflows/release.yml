name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Build release binaries
        env:
          GOEXPERIMENT: jsonv2
        run: |
          set -euo pipefail
          mkdir -p dist
          tag="${GITHUB_REF_NAME}"
          : > dist/checksums.txt

          for goos in linux darwin windows; do
            for goarch in amd64 arm64; do
              ext=""
              if [ "$goos" = "windows" ]; then
                ext=".exe"
              fi

              asset="oxinfer_${tag}_${goos}_${goarch}${ext}"

              GOOS="$goos" GOARCH="$goarch" go build \
                -trimpath \
                -ldflags="-s -w" \
                -o "dist/${asset}" \
                ./cmd/oxinfer

              (cd dist && sha256sum "${asset}" >> checksums.txt)
            done
          done

          test -s dist/checksums.txt
          test "$(find dist -maxdepth 1 -type f | wc -l | tr -d ' ')" = "7"
          ls -lh dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
