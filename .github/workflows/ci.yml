name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run test suite
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release

      - name: Run cache smoke
        run: cargo test --locked --test cli_smoke cache_reuses_unchanged_files_surgically -- --exact
