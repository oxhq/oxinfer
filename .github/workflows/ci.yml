name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Build oxinfer
        run: GOEXPERIMENT=jsonv2 go build -o oxinfer ./cmd/oxinfer

      - name: Run test suite
        run: GOEXPERIMENT=jsonv2 go test ./...
